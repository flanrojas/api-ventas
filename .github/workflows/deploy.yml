name: CI/CD Back Ventas

on:
  push:
    branches: ["deploy"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: docker build -t back-ventas .

      - name: Tag image
        run: docker tag back-ventas:latest ${{ vars.ECR_REPO_URL }}:latest

      - name: Push image
        run: docker push ${{ vars.ECR_REPO_URL }}:latest

      - name: Check EC2 host secret
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "EC2_HOST está vacío o no existe"
            exit 1
          else
            echo "EC2_HOST existe"


      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          ECR_REPO_URL: ${{ vars.ECR_REPO_URL }}
          DB_ENDPOINT: ${{ secrets.DB_ENDPOINT }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_SESSION_TOKEN,AWS_REGION,ECR_REPO_URL,DB_ENDPOINT,DB_PORT,DB_NAME,DB_USERNAME,DB_PASSWORD
          script: |
            # Login to ECR
            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin "$(echo "$ECR_REPO_URL" | cut -d/ -f1)"
            docker pull "$ECR_REPO_URL:latest"

            # Create network if not exists
            docker network create ventas-net || true

            # Start MySQL if not running
            if [ ! "$(docker ps -q -f name=mysql-ventas)" ]; then
              docker stop mysql-ventas || true
              docker rm mysql-ventas || true
              docker run -d --name mysql-ventas --network ventas-net \
                -e MYSQL_ROOT_PASSWORD="$DB_PASSWORD" \
                -e MYSQL_DATABASE="$DB_NAME" \
                -e MYSQL_USER="$DB_USERNAME" \
                -e MYSQL_PASSWORD="$DB_PASSWORD" \
                -p 3306:3306 \
                -v mysql_data:/var/lib/mysql \
                mysql:8.0
              # Wait for MySQL to be ready
              echo "Waiting for MySQL to be ready..."
              sleep 30
            fi

            # Deploy backend
            docker stop back-ventas || true
            docker rm back-ventas || true
            docker run -d --name back-ventas --network ventas-net -p 8080:8080 \
              -e DB_ENDPOINT="mysql-ventas" \
              -e DB_PORT="$DB_PORT" \
              -e DB_NAME="$DB_NAME" \
              -e DB_USERNAME="$DB_USERNAME" \
              -e DB_PASSWORD="$DB_PASSWORD" \
              "$ECR_REPO_URL:latest"
