name: CI/CD Back Ventas

on:
  push:
    branches: ["deploy"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: docker build -t back-ventas .

      - name: Tag image
        run: docker tag back-ventas:latest ${{ vars.ECR_REPO_URL }}:latest

      - name: Push image
        run: docker push ${{ vars.ECR_REPO_URL }}:latest

      - name: Deploy on EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_BACKEND_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "# Login to ECR",
              "aws ecr get-login-password --region ${{ vars.AWS_REGION }} | docker login --username AWS --password-stdin $(echo ${{ vars.ECR_REPO_URL }} | cut -d/ -f1)",
              
              "# Pull imagen actualizada",
              "docker pull ${{ vars.ECR_REPO_URL }}:latest",
              
              "# Crear red si no existe",
              "docker network create ventas-net || true",
              
              "# Iniciar MySQL si no está corriendo",
              "if [ ! \"$(docker ps -q -f name=mysql-ventas)\" ]; then",
              "  docker stop mysql-ventas || true",
              "  docker rm mysql-ventas || true",
              "  docker run -d --name mysql-ventas --network ventas-net -e MYSQL_ROOT_PASSWORD=${{ secrets.DB_PASSWORD }} -e MYSQL_DATABASE=${{ secrets.DB_NAME }} -e MYSQL_USER=${{ secrets.DB_USERNAME }} -e MYSQL_PASSWORD=${{ secrets.DB_PASSWORD }} -p 3306:3306 -v mysql_data:/var/lib/mysql mysql:8.0",
              "  echo Waiting for MySQL...",
              "  sleep 30",
              "fi",
              
              "# Deploy backend",
              "docker stop back-ventas || true",
              "docker rm back-ventas || true",
              "docker run -d --name back-ventas --network ventas-net -p 8081:8080 -e DB_ENDPOINT=mysql-ventas -e DB_PORT=${{ secrets.DB_PORT }} -e DB_NAME=${{ secrets.DB_NAME }} -e DB_USERNAME=${{ secrets.DB_USERNAME }} -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} ${{ vars.ECR_REPO_URL }}:latest"
            ]' \
            --query "Command.CommandId" \
            --output text)
          
          echo "SSM Command ID: $COMMAND_ID"
          
          # Esperar que el comando termine
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_BACKEND_ID }}"
          
          # Ver el resultado
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_BACKEND_ID }}" \
            --query "StandardOutputContent" \
            --output text